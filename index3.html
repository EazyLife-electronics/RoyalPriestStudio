<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Royal Priesthood Studio | Ibadan</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
<style>
  :root {
    --gold:#C9A84C; --gold-light:#E8C97A; --gold-pale:#F5E6B8;
    --black:#060606; --deep:#0D0A06; --charcoal:#1A1510; --mid:#2A2118;
    --text:#D4C09A; --muted:#7A6A4A;
    --nav-bg: rgba(6, 6, 6, 0.95);
    --white: #FFFFFF;
    --noise-opacity: 0.35;
  }

  [data-theme="light"] {
    --black: #FCFBF7; --deep: #F4F1E8; --charcoal: #E9E4D5; --mid: #DED8C4;
    --text: #332D24; --muted: #6B5F4A; --nav-bg: rgba(252, 251, 247, 0.95);
    --white: #060606; --noise-opacity: 0.15;
  }

  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]) {
      --black: #FCFBF7; --deep: #F4F1E8; --charcoal: #E9E4D5; --mid: #DED8C4;
      --text: #332D24; --muted: #6B5F4A; --nav-bg: rgba(252, 251, 247, 0.95);
      --white: #060606; --noise-opacity: 0.15;
    }
  }

  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--black);color:var(--text);font-family:'Cormorant Garamond',serif;overflow-x:hidden;transition: background 0.4s ease;}

  /* NOISE Overlay */
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:1000;opacity:var(--noise-opacity);
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");}

  /* CURSOR */
  .cursor{position:fixed;width:12px;height:12px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;}
  .cursor-ring{position:fixed;width:36px;height:36px;border:1px solid var(--gold);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);opacity:.5;transition:width .2s,height .2s,opacity .3s;}

  /* NAV */
  nav{position:fixed;top:0;left:0;right:0;z-index:500;padding:24px 60px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom, var(--nav-bg), transparent);transition:background .4s;}
  nav.scrolled{background:var(--nav-bg);border-bottom:1px solid rgba(201,168,76,.15);}
  .nav-logo{font-family:'Cinzel Decorative',cursive;font-size:13px;font-weight:700;color:var(--gold);text-decoration:none;text-transform:uppercase;}
  .nav-logo span{display:block;font-size:9px;font-weight:400;color:var(--muted);letter-spacing:.4em;}
  .nav-links{display:flex;gap:35px;list-style:none;align-items:center;}
  .nav-links a{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .3s;}
  .nav-links a:hover{color:var(--gold-light);}
  
  .theme-toggle{background:none;border:1px solid rgba(201,168,76,0.3);color:var(--gold);cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .nav-cta{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--black);background:var(--gold);padding:10px 24px;text-decoration:none;}

  /* MOBILE MENU */
  .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;}
  .hamburger span{display:block;width:24px;height:1px;background:var(--gold);}
  .mobile-menu{display:none;position:fixed;inset:0;background:var(--nav-bg);z-index:400;flex-direction:column;align-items:center;justify-content:center;gap:30px;}
  .mobile-menu.open{display:flex;}
  .mobile-menu a{font-family:'Cinzel',serif;font-size:18px;color:var(--text);text-decoration:none;}

  /* HERO */
  #hero{height:100vh;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;text-align:center;}
  .hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(201,168,76,.08),transparent 60%), var(--black);}
  .hero-content{position:relative;z-index:2;padding:0 20px;}
  .hero-title{font-family:'Cinzel Decorative',cursive;font-size:clamp(40px,7vw,90px);color:var(--white);line-height:1;margin-bottom:15px;}
  .hero-title .gold{color:var(--gold);}
  .hero-subtitle{font-family:'Cinzel',serif;font-size:18px;color:var(--gold-light);letter-spacing:.3em;text-transform:uppercase;}

  /* GALLERY SLIDER (INSTAGRAM STYLE) */
  #gallery{padding:100px 60px;background:var(--deep);}
  .gallery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;}
  .gallery-item{background:var(--charcoal);overflow:hidden;position:relative;}
  
  .gallery-media-wrap{position:relative;aspect-ratio:4/5;overflow:hidden;background:#000;}
  .slider-container{display:flex;height:100%;transition:transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);}
  .slider-container img, .slider-container iframe{min-width:100%;width:100%;height:100%;object-fit:cover;}

  .slider-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.4);color:white;border:none;width:35px;height:35px;border-radius:50%;cursor:pointer;z-index:10;opacity:0;transition:opacity 0.3s;}
  .gallery-item:hover .slider-nav{opacity:1;}
  .prev-btn{left:10px;}.next-btn{right:10px;}
  
  .slider-dots{position:absolute;bottom:15px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:11;}
  .dot{width:6px;height:6px;background:rgba(255,255,255,0.3);border-radius:50%;transition:0.3s;}
  .dot.active{background:var(--gold);transform:scale(1.3);}

  .gallery-item-body{padding:25px;}
  .gallery-item-title{font-family:'Cinzel',serif;font-size:18px;color:var(--white);margin-bottom:8px;}
  .gallery-item-desc{font-size:15px;color:var(--muted);line-height:1.6;}

  /* SECTIONS & BUTTONS */
  .section-label{font-family:'Cinzel',serif;font-size:10px;color:var(--gold);letter-spacing:.5em;text-transform:uppercase;margin-bottom:15px;display:block;}
  .btn-outline{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.2em;color:var(--gold);border:1px solid var(--gold);padding:15px 35px;text-decoration:none;display:inline-block;margin-top:30px;}

  /* RESPONSIVE */
  @media(max-width:900px){
    nav{padding:20px;}
    .nav-links, .nav-cta{display:none;}
    .hamburger{display:flex;}
    .gallery-grid{grid-template-columns:1fr;}
    #gallery{padding:60px 20px;}
  }

  /* REVEAL ANIMATION */
  .reveal{opacity:0;transform:translateY(30px);transition:0.8s ease-out;}
  .reveal.visible{opacity:1;transform:translateY(0);}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<div class="mobile-menu" id="mobileMenu">
  <a href="#hero" onclick="closeMobile()">Home</a>
  <a href="#gallery" onclick="closeMobile()">Gallery</a>
  <a href="#" id="mobileThemeToggle">Toggle Theme</a>
</div>

<nav id="navbar">
  <a class="nav-logo" href="#hero">Royal Priesthood<span>Studio · Ibadan</span></a>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#services">Services</a></li>
    <li><a href="#gallery">Gallery</a></li>
    <li><a href="#contact">Contact</a></li>
    <li><button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button></li>
  </ul>
  <a class="nav-cta" href="#contact">Book Session</a>
  <div class="hamburger" onclick="toggleMobile()"><span></span><span></span><span></span></div>
</nav>

<section id="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <div class="section-label">Photography & Videography</div>
    <h1 class="hero-title">Royal<br/><span class="gold">Priesthood</span></h1>
    <div class="hero-subtitle">Studio</div>
    <a href="#gallery" class="btn-outline">Explore Portfolio</a>
  </div>
</section>

<section id="gallery">
  <div style="text-align:center; margin-bottom: 60px;">
    <span class="section-label">Our Portfolio</span>
    <h2 style="font-family:'Cinzel Decorative'; font-size: 40px; color:var(--white);">Visual <span class="gold">Stories</span></h2>
  </div>
  <div class="gallery-grid" id="gallery-grid">
    </div>
</section>

<script>
/* ── THEME LOGIC ── */
const themeToggle = document.getElementById('themeToggle');
const html = document.documentElement;
const toggleTheme = () => {
  const isLight = html.getAttribute('data-theme') === 'light';
  const newTheme = isLight ? 'dark' : 'light';
  html.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
  themeToggle.querySelector('i').className = newTheme === 'light' ? 'fas fa-sun' : 'fas fa-moon';
};
themeToggle.addEventListener('click', toggleTheme);
if(localStorage.getItem('theme')) html.setAttribute('data-theme', localStorage.getItem('theme'));

/* ── CURSOR ── */
const cursor=document.getElementById('cursor'), ring=document.getElementById('cursorRing');
document.addEventListener('mousemove', e => {
  cursor.style.left = ring.style.left = e.clientX + 'px';
  cursor.style.top = ring.style.top = e.clientY + 'px';
});

/* ── MOBILE NAV ── */
function toggleMobile(){ document.getElementById('mobileMenu').classList.toggle('open'); }
function closeMobile(){ document.getElementById('mobileMenu').classList.remove('open'); }

/* ── GALLERY LOADER & SLIDER ── */
async function loadGallery() {
  try {
    const response = await fetch('gallery.json');
    const gallery = await response.json();
    const grid = document.getElementById('gallery-grid');

    grid.innerHTML = gallery.map((item, idx) => {
      const isMulti = item.media.length > 1;
      
      const mediaHTML = item.media.map(url => {
        if(url.includes('youtube.com') || url.includes('embed')) {
          return `<iframe src="${url}" frameborder="0" allowfullscreen></iframe>`;
        }
        return `<img src="${url}" alt="${item.title}" loading="lazy">`;
      }).join('');

      const dotsHTML = isMulti ? `<div class="slider-dots">${item.media.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('')}</div>` : '';
      const navHTML = isMulti ? `
        <button class="slider-nav prev-btn" onclick="moveSlider(${idx}, -1)"><i class="fas fa-chevron-left"></i></button>
        <button class="slider-nav next-btn" onclick="moveSlider(${idx}, 1)"><i class="fas fa-chevron-right"></i></button>
      ` : '';

      return `
        <div class="gallery-item reveal" id="gal-${idx}" data-current="0" data-total="${item.media.length}">
          <div class="gallery-media-wrap">
            ${navHTML}
            <div class="slider-container" id="slide-cont-${idx}">${mediaHTML}</div>
            ${dotsHTML}
          </div>
          <div class="gallery-item-body">
            <div style="color:var(--gold); font-size:10px; margin-bottom:5px;">${item.date}</div>
            <h3 class="gallery-item-title">${item.title}</h3>
            <p class="gallery-item-desc">${item.desc}</p>
          </div>
        </div>
      `;
    }).join('');

    // Intersection Observer for scroll reveal
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  } catch (e) { console.error("Gallery failed to load", e); }
}

window.moveSlider = function(idx, dir) {
  const el = document.getElementById(`gal-${idx}`);
  const cont = document.getElementById(`slide-cont-${idx}`);
  const dots = el.querySelectorAll('.dot');
  let current = parseInt(el.getAttribute('data-current'));
  const total = parseInt(el.getAttribute('data-total'));

  current = (current + dir + total) % total;
  el.setAttribute('data-current', current);
  cont.style.transform = `translateX(-${current * 100}%)`;
  
  dots.forEach((d, i) => d.classList.toggle('active', i === current));
};

loadGallery();
window.addEventListener('scroll', () => {
  document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
});
</script>
</body>
</html>
