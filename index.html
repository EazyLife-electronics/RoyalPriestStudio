<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Royal Priesthood Studio | Photography & Videography Ibadan</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
<style>
  :root {
    --gold:#C9A84C; --gold-light:#E8C97A; --gold-pale:#F5E6B8;
    --black:#060606; --deep:#0D0A06; --charcoal:#1A1510; --mid:#2A2118;
    --text:#D4C09A; --muted:#7A6A4A;
    --nav-bg: rgba(6, 6, 6, 0.95);
    --white: #FFFFFF; --noise-opacity: 0.35;
  }

  [data-theme="light"] {
    --black: #FCFBF7; --deep: #F4F1E8; --charcoal: #E9E4D5; --mid: #DED8C4;
    --text: #332D24; --muted: #6B5F4A; --nav-bg: rgba(252, 251, 247, 0.95);
    --white: #060606; --noise-opacity: 0.15;
  }

  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--black);color:var(--text);font-family:'Cormorant Garamond',serif;overflow-x:hidden;transition:background 0.4s ease;}

  /* CURSOR */
  .cursor{position:fixed;width:10px;height:10px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;}
  .cursor-ring{position:fixed;width:30px;height:30px;border:1px solid var(--gold);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:0.1s ease-out;}

  /* NAV */
  nav{position:fixed;top:0;left:0;right:0;z-index:500;padding:20px 60px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom, var(--nav-bg), transparent);transition:0.4s;}
  nav.scrolled{background:var(--nav-bg);padding:15px 60px;border-bottom:1px solid rgba(201,168,76,0.1);}
  .nav-logo{font-family:'Cinzel Decorative',cursive;font-size:14px;color:var(--gold);text-decoration:none;text-transform:uppercase;line-height:1.2;}
  .nav-logo span{display:block;font-size:9px;color:var(--muted);letter-spacing:0.3em;}
  .nav-links{display:flex;gap:30px;list-style:none;align-items:center;}
  .nav-links a{font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.2em;color:var(--muted);text-decoration:none;transition:0.3s;}
  .nav-links a:hover{color:var(--gold);}
  
  .theme-toggle{background:none;border:1px solid rgba(201,168,76,0.3);color:var(--gold);cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;}

  /* HERO */
  #hero{height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;position:relative;background:radial-gradient(circle at center, rgba(201,168,76,0.05) 0%, transparent 70%);}
  .hero-title{font-family:'Cinzel Decorative',cursive;font-size:clamp(40px,8vw,80px);color:var(--white);line-height:1.1;}
  .hero-title span{color:var(--gold);}
  .hero-tagline{font-size:18px;margin-top:20px;font-style:italic;color:var(--muted);}

  /* GALLERY GRID */
  #gallery{padding:100px 60px;}
  .gallery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:30px;margin-top:50px;}
  .gallery-item{background:var(--charcoal);border-radius:2px;overflow:hidden;user-select:none;}
  .gallery-media-wrap{position:relative;aspect-ratio:4/5;overflow:hidden;background:#000;touch-action:pan-y;}
  .slider-container{display:flex;height:100%;transition:transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);}
  .slider-container img, .slider-container iframe{min-width:100%;width:100%;height:100%;object-fit:cover;pointer-events:none;}
  .slider-container iframe{pointer-events:auto;}

  .slider-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.4);color:white;border:none;width:35px;height:35px;border-radius:50%;cursor:pointer;z-index:10;opacity:0;transition:0.3s;}
  .gallery-item:hover .slider-nav{opacity:1;}
  .prev-btn{left:10px;}.next-btn{right:10px;}

  .slider-dots{position:absolute;bottom:15px;left:50%;transform:translateX(-50%);display:flex;gap:6px;}
  .dot{width:6px;height:6px;background:rgba(255,255,255,0.3);border-radius:50%;transition:0.3s;}
  .dot.active{background:var(--gold);transform:scale(1.2);}

  .gallery-body{padding:25px;}
  .gallery-title{font-family:'Cinzel',serif;font-size:18px;color:var(--white);margin-bottom:10px;}
  .gallery-desc{font-size:15px;color:var(--muted);line-height:1.5;}

  /* REVEAL ANIMATION */
  .reveal{opacity:0;transform:translateY(30px);transition:0.8s ease-out;}
  .reveal.visible{opacity:1;transform:translateY(0);}

  @media(max-width:900px){
    nav{padding:20px;} .nav-links{display:none;}
    .gallery-grid{grid-template-columns:1fr;}
    #gallery{padding:60px 20px;}
    .slider-nav{display:none;} /* Use swipe on mobile */
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav id="navbar">
  <a class="nav-logo" href="#">Royal Priesthood<span>Studio · Ibadan</span></a>
  <ul class="nav-links">
    <li><a href="#gallery">Gallery</a></li>
    <li><a href="#services">Services</a></li>
    <li><button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button></li>
  </ul>
</nav>

<section id="hero">
  <div>
    <h1 class="hero-title">Royal<br/><span>Priesthood</span></h1>
    <p class="hero-tagline" id="hero-tagline">...</p>
  </div>
</section>

<section id="gallery">
  <h2 style="font-family:'Cinzel'; text-align:center; color:var(--gold); letter-spacing:0.3em;">PORTFOLIO</h2>
  <div class="gallery-grid" id="gallery-grid"></div>
</section>

<script>
/* ── THEME ENGINE ── */
const themeToggle = document.getElementById('themeToggle');
const html = document.documentElement;
themeToggle.addEventListener('click', () => {
  const isLight = html.getAttribute('data-theme') === 'light';
  const newTheme = isLight ? 'dark' : 'light';
  html.setAttribute('data-theme', newTheme);
  themeToggle.querySelector('i').className = newTheme === 'light' ? 'fas fa-sun' : 'fas fa-moon';
});

/* ── CURSOR ── */
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
document.addEventListener('mousemove', (e) => {
  cursor.style.left = ring.style.left = e.clientX + 'px';
  cursor.style.top = ring.style.top = e.clientY + 'px';
});

/* ── SWIPE LOGIC ── */
let touchStartX = 0;
window.handleTouchStart = (e) => { touchStartX = e.changedTouches[0].screenX; };
window.handleTouchEnd = (e, idx) => {
  const touchEndX = e.changedTouches[0].screenX;
  if (touchEndX < touchStartX - 50) moveSlider(idx, 1);
  if (touchEndX > touchStartX + 50) moveSlider(idx, -1);
};

window.moveSlider = (idx, dir) => {
  const el = document.getElementById(`gal-${idx}`);
  const cont = document.getElementById(`slide-cont-${idx}`);
  const dots = el.querySelectorAll('.dot');
  let current = parseInt(el.getAttribute('data-current'));
  const total = parseInt(el.getAttribute('data-total'));
  
  current = (current + dir + total) % total;
  el.setAttribute('data-current', current);
  cont.style.transform = `translateX(-${current * 100}%)`;
  dots.forEach((d, i) => d.classList.toggle('active', i === current));
};

/* ── DATA LOADER ── */
async function init() {
  try {
    const [info, gallery] = await Promise.all([
      fetch('studio-info.json').then(r => r.json()),
      fetch('gallery.json').then(r => r.json())
    ]);

    document.getElementById('hero-tagline').textContent = info.tagline;

    const grid = document.getElementById('gallery-grid');
    grid.innerHTML = gallery.map((item, idx) => {
      const isMulti = item.media.length > 1;
      const mediaHTML = item.media.map(url => {
        if(url.includes('embed')) return `<iframe src="${url}" frameborder="0" allowfullscreen></iframe>`;
        return `<img src="${url}" alt="${item.title}" loading="lazy">`;
      }).join('');

      return `
        <div class="gallery-item reveal" id="gal-${idx}" data-current="0" data-total="${item.media.length}">
          <div class="gallery-media-wrap" 
               ontouchstart="handleTouchStart(event)" 
               ontouchend="handleTouchEnd(event, ${idx})">
            ${isMulti ? `<button class="slider-nav prev-btn" onclick="moveSlider(${idx}, -1)">❮</button>
                         <button class="slider-nav next-btn" onclick="moveSlider(${idx}, 1)">❯</button>` : ''}
            <div class="slider-container" id="slide-cont-${idx}">${mediaHTML}</div>
            ${isMulti ? `<div class="slider-dots">${item.media.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('')}</div>` : ''}
          </div>
          <div class="gallery-body">
            <h3 class="gallery-title">${item.title}</h3>
            <p class="gallery-desc">${item.desc}</p>
          </div>
        </div>`;
    }).join('');

    // Animation Observer
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  } catch (err) { console.error("Error loading site data:", err); }
}

window.addEventListener('scroll', () => {
  document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
});

init();
</script>
</body>
</html>
