<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Priest Studios | Portfolio & Booking</title>
    <style>
        :root { --gold: #D4AF37; --dark: #050505; --green: #25D366; --glass: rgba(255,255,255,0.05); }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { background: var(--dark); color: white; font-family: 'Inter', sans-serif; margin: 0; scroll-behavior: smooth; }
        
        /* Floating WhatsApp */
        .wa-float { position: fixed; bottom: 25px; right: 25px; background: var(--green); color: white; padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 10px; }
        .wa-float:hover { transform: scale(1.1); }

        header { padding: 80px 20px; text-align: center; background: linear-gradient(to bottom, #111, var(--dark)); }
        section { padding: 60px 5%; }
        h2 { color: var(--gold); font-size: 2rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; border-bottom: 1px solid var(--gold); display: inline-block; }

        /* Gallery Grid */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .gallery-item { height: 300px; background-size: cover; background-position: center; border-radius: 8px; cursor: pointer; border: 1px solid #222; }
        .gallery-item:hover { filter: brightness(1.2); border-color: var(--gold); }

        /* Video Grid */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        .video-card iframe { width: 100%; height: 220px; border-radius: 12px; border: 1px solid #333; }

        /* Services */
        .service-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: var(--glass); border-radius: 20px; border: 1px solid #222; overflow: hidden; }
        .card-img { height: 250px; background-size: cover; background-position: center; }
        .card-body { padding: 25px; }
        .cta-wa { display: block; background: var(--green); color: white; text-align: center; padding: 15px; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 20px; }

        /* Lightbox */
        #lightbox { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); text-align: center; }
        #lightbox img { max-height: 80%; max-width: 90%; margin-top: 5%; border: 2px solid var(--gold); }

        .nav-links { margin-top: 20px; }
        .nav-links a { color: #888; text-decoration: none; margin: 0 15px; font-size: 14px; }
        .nav-links a:hover { color: var(--gold); }
    </style>
</head>
<body>

    <a href="#" id="wa-master" class="wa-float" target="_blank">Chat with Philip</a>

    <header>
        <h1 style="font-size: 3rem; margin:0;">ROYAL PRIEST <span style="color:var(--gold)">STUDIOS</span></h1>
        <p style="color:#888; letter-spacing: 4px;">CREATIVE COLLECTIVE • IBADAN</p>
        <div class="nav-links">
            <a href="#gallery">GALLERY</a>
            <a href="#videos">VIDEOS</a>
            <a href="#services">SERVICES</a>
        </div>
    </header>

    <section id="gallery">
        <h2>Photo Gallery</h2>
        <div id="photo-list" class="gallery-grid"></div>
    </section>

    <section id="videos" style="background: #080808;">
        <h2>Cinema & Music Videos</h2>
        <div id="video-list" class="video-grid"></div>
    </section>

    <section id="services">
        <h2>Packages & Rates</h2>
        <div id="service-list" class="service-grid"></div>
    </section>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="">
        <p style="color:white; margin-top:10px;">Click anywhere to close</p>
    </div>

    <script>
        async function loadContent() {
            const response = await fetch('royal_priest_studio.json');
            const data = await response.json();

            // WhatsApp Global Link
            document.getElementById('wa-master').href = `https://wa.me/${data.studio_info.whatsapp_number}?text=Hello Philip, I saw your portfolio and I'd like to inquire about a session.`;

            // 1. Render Gallery
            const photoList = document.getElementById('photo-list');
            data.gallery.forEach(img => {
                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.style.backgroundImage = `url('${img.url}')`;
                div.onclick = () => {
                    document.getElementById('lightbox-img').src = img.url;
                    document.getElementById('lightbox').style.display = 'block';
                };
                photoList.appendChild(div);
            });

            // 2. Render Videos
            const videoList = document.getElementById('video-list');
            data.videos.forEach(v => {
                videoList.innerHTML += `
                    <div class="video-card">
                        <iframe src="https://www.youtube.com/embed/${v.youtube_id}" frameborder="0" allowfullscreen></iframe>
                        <h4 style="margin:15px 0 5px">${v.title}</h4>
                        <p style="color:#666; font-size:14px">${v.category}</p>
                    </div>
                `;
            });

            // 3. Render Services
            const serviceList = document.getElementById('service-list');
            data.service_categories.forEach(cat => {
                cat.packages.forEach(pkg => {
                    const waLink = `https://wa.me/${data.studio_info.whatsapp_number}?text=I am interested in the ${pkg.name} package.`;
                    serviceList.innerHTML += `
                        <div class="card">
                            <div class="card-img" style="background-image:url('${pkg.image}')"></div>
                            <div class="card-body">
                                <h3>${pkg.name}</h3>
                                <p style="font-size:1.8rem; font-weight:bold; color:var(--gold)">₦${pkg.price.toLocaleString()}</p>
                                <p style="color:#aaa; font-size:14px; min-height:60px;">${pkg.description}</p>
                                <a href="${waLink}" class="cta-wa" target="_blank">Book via WhatsApp</a>
                            </div>
                        </div>
                    `;
                });
            });
        }
        loadContent();
    </script>
</body>
</html>
