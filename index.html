<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Priest Studios Limited | Creative Collective</title>
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #0a0a0a;
            --card-bg: #141414;
            --glass: rgba(255, 255, 255, 0.05);
            --green: #28a745;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            padding-bottom: 50px;
        }

        header { text-align: center; padding: 60px 20px; }
        .logo { max-width: 180px; margin-bottom: 20px; }

        /* Navigation */
        .filter-nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 40px;
        }

        .filter-nav button {
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 12px;
            font-weight: bold;
        }

        .filter-nav button:hover, .filter-nav button.active {
            background: var(--gold);
            color: black;
            border-color: var(--gold);
        }

        /* Grid & Cards */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px;
            padding: 0 5%;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #222;
            transition: 0.3s ease;
        }

        .card:hover { transform: translateY(-10px); border-color: var(--gold); }

        .card-img {
            height: 380px;
            background-size: cover;
            background-position: center;
        }

        .card-content { padding: 25px; }
        .card-content h3 { color: var(--gold); margin: 0 0 10px; font-size: 1.5rem; }
        .price { font-size: 2.2rem; font-weight: bold; margin: 10px 0; }
        .commitment { color: #888; font-size: 0.9rem; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }

        .features { list-style: none; padding: 0; margin: 0 0 25px; }
        .features li { padding: 6px 0; color: #bbb; font-size: 0.95rem; }
        .features li::before { content: "◈"; color: var(--gold); margin-right: 10px; }

        .book-btn {
            width: 100%;
            padding: 16px;
            background: var(--green);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .book-btn:hover { filter: brightness(1.1); transform: scale(1.02); }

        /* Booking Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: #1a1a1a;
            width: 90%;
            max-width: 500px;
            margin: 50px auto;
            padding: 40px;
            border-radius: 15px;
            border: 1px solid var(--gold);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #252525;
            border: 1px solid #333;
            color: white;
            border-radius: 5px;
        }

        .close-btn { color: white; float: right; font-size: 28px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1>Royal Priest Studios</h1>
        <div class="filter-nav">
            <button class="active" onclick="filter('all')">All Services</button>
            <button onclick="filter('photography')">Photography</button>
            <button onclick="filter('videography')">Videography</button>
            <button onclick="filter('music')">Music Production</button>
        </div>
    </header>

    <main id="package-grid" class="grid-container">
        </main>

    <div id="booking-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 style="color:var(--gold)">Secure Your Slot</h2>
            <form action="https://formspree.io/f/YOUR_ID_HERE" method="POST">
                <input type="text" id="pkg-name" name="Selected Package" readonly style="background:#111; color:var(--gold)">
                <input type="text" name="Client Name" placeholder="Your Full Name" required>
                <input type="email" name="Email" placeholder="Email Address" required>
                <input type="date" name="Event Date" required>
                <select name="Event Location" onchange="toggleNote(this.value)">
                    <option value="Ibadan">Event is in Ibadan</option>
                    <option value="Outside">Event is outside Ibadan</option>
                </select>
                <p id="travel-warning" style="display:none; color:#888; font-size:12px; margin-bottom:15px;">
                    *Outside Ibadan: Client handles logistics (Transport/Feeding/Accommodation).
                </p>
                <textarea name="Notes" placeholder="Additional details..."></textarea>
                <button type="submit" class="book-btn">Submit Booking Request</button>
            </form>
        </div>
    </div>

    <script>
        const JSON_PATH = 'royal_priest_studio.json';

        // Load data on start
        async function loadData() {
            try {
                const response = await fetch(JSON_PATH);
                const data = await response.json();
                render(data.service_categories);
            } catch (err) { console.error("Could not fetch JSON data", err); }
        }

        function render(categories) {
            const grid = document.getElementById('package-grid');
            grid.innerHTML = '';

            categories.forEach(cat => {
                cat.packages.forEach(pkg => {
                    const commitment = (pkg.price * 0.2).toLocaleString();
                    const card = document.createElement('div');
                    card.className = `card ${cat.slug}`;
                    card.innerHTML = `
                        <div class="card-img" style="background-image: url('${pkg.image}')"></div>
                        <div class="card-content">
                            <h3>${pkg.name}</h3>
                            <div class="price">₦${pkg.price.toLocaleString()}</div>
                            <p class="commitment">Commitment Fee (20%): ₦${commitment}</p>
                            <ul class="features">
                                ${pkg.features.map(f => `<li>${f}</li>`).join('')}
                            </ul>
                            <button class="book-btn" onclick="openBooking('${pkg.name}')">Add to Booking</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            });
        }

        function filter(slug) {
            const cards = document.querySelectorAll('.card');
            const btns = document.querySelectorAll('.filter-nav button');
            
            // UI Button Active State
            btns.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            cards.forEach(c => {
                if(slug === 'all' || c.classList.contains(slug)) {
                    c.style.display = 'block';
                } else {
                    c.style.display = 'none';
                }
            });
        }

        function openBooking(pkg) {
            document.getElementById('booking-modal').style.display = 'block';
            document.getElementById('pkg-name').value = pkg;
        }

        function closeModal() { document.getElementById('booking-modal').style.display = 'none'; }
        
        function toggleNote(val) {
            document.getElementById('travel-warning').style.display = (val === 'Outside') ? 'block' : 'none';
        }

        window.onclick = function(e) { 
            if (e.target == document.getElementById('booking-modal')) closeModal(); 
        }

        loadData();
    </script>
</body>
</html>
